services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: 1000
        GID: 33
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - .:/var/www/html
    networks:
      - controlplus
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile.coolify
    depends_on:
      - app
    env_file:
      - .env
    volumes:
      - .:/var/www/html
    networks:
      - controlplus
    ports:
      - "80:80"
    restart: unless-stopped

  db:
    image: mysql:8.0
    env_file:
      - .env
    restart: unless-stopped
    command: >
      --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - controlplus

volumes:
  db_data:

networks:
  controlplus:
